name: Build Windows

on:
  workflow_dispatch:

jobs:
  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --x64 --config electron-builder.config.json --publish=never
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: podcats-win
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
